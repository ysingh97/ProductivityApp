name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify backend build
        run: npm run build

      - name: Write backend build summary
        run: |
          {
            echo "## Backend Build"
            echo ""
            echo "- Dependencies installed with \`npm ci\` in \`app-server\`."
            echo "- Backend build verification passed with \`npm run build\`."
          } >> "$GITHUB_STEP_SUMMARY"

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload backend source artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-source
          path: |
            app-server/app.js
            app-server/server.js
            app-server/package.json
            app-server/package-lock.json
            app-server/config/**
            app-server/controllers/**
            app-server/middleware/**
            app-server/models/**
            app-server/routes/**
            app-server/scripts/**
            app-server/services/**
            app-server/utils/**
            app-server/workers/**
          if-no-files-found: error
          retention-days: 7

      - name: Write backend summary
        run: |
          {
            echo "## Backend Tests"
            echo ""
            echo "- Dependencies installed with \`npm ci\` in \`app-server\`."
            echo "- Backend tests passed with \`npm test\`."
            echo "- Uploaded artifact: \`backend-source\`."
          } >> "$GITHUB_STEP_SUMMARY"

  shared-tests:
    name: Shared Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run shared package tests
        run: npm run test:shared

      - name: Write shared test summary
        run: |
          {
            echo "## Shared Tests"
            echo ""
            echo "- Dependencies installed with \`npm ci\`."
            echo "- Shared package tests passed with \`npm run test:shared\`."
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Write frontend test summary
        run: |
          {
            echo "## Frontend Tests"
            echo ""
            echo "- Dependencies installed with \`npm ci\`."
            echo "- Frontend tests passed with \`npm run test:frontend\`."
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: build
          if-no-files-found: error
          retention-days: 7

      - name: Write frontend summary
        run: |
          {
            echo "## Frontend Build"
            echo ""
            echo "- Dependencies installed with \`npm ci\`."
            echo "- Frontend build passed with \`npm run build\`."
            echo "- Uploaded artifact: \`frontend-build\`."
          } >> "$GITHUB_STEP_SUMMARY"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/productivity_e2e_ci
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand({ ping: 1 })\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app-server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix app-server ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Write E2E summary
        run: |
          {
            echo "## E2E Tests"
            echo ""
            echo "- Provisioned an ephemeral MongoDB service for the backend with \`MONGO_URI=$MONGO_URI\`."
            echo "- Installed frontend dependencies with \`npm ci\`."
            echo "- Installed backend dependencies with \`npm --prefix app-server ci\`."
            echo "- Installed Playwright Chromium with \`npx playwright install --with-deps chromium\`."
            echo "- Playwright E2E suite passed with \`npm run test:e2e\`."
          } >> "$GITHUB_STEP_SUMMARY"
