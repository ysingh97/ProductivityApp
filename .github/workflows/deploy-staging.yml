name: Deploy Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - master
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy Staging
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    env:
      RENDER_STAGING_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_STAGING_FRONTEND_DEPLOY_HOOK }}
      RENDER_STAGING_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_STAGING_BACKEND_DEPLOY_HOOK }}
      RENDER_STAGING_WORKER_DEPLOY_HOOK: ${{ secrets.RENDER_STAGING_WORKER_DEPLOY_HOOK }}
      SMOKE_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
      SMOKE_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate staging configuration
        run: |
          required_variables=(
            RENDER_STAGING_FRONTEND_DEPLOY_HOOK
            RENDER_STAGING_BACKEND_DEPLOY_HOOK
            RENDER_STAGING_WORKER_DEPLOY_HOOK
            SMOKE_FRONTEND_URL
            SMOKE_API_BASE_URL
          )

          for variable_name in "${required_variables[@]}"; do
            if [ -z "${!variable_name}" ]; then
              echo "${variable_name} is required." >&2
              exit 1
            fi
          done

      - name: Trigger Render staging deploys
        run: |
          curl --fail --silent --show-error --output /dev/null --request POST "${RENDER_STAGING_BACKEND_DEPLOY_HOOK}"
          curl --fail --silent --show-error --output /dev/null --request POST "${RENDER_STAGING_WORKER_DEPLOY_HOOK}"
          curl --fail --silent --show-error --output /dev/null --request POST "${RENDER_STAGING_FRONTEND_DEPLOY_HOOK}"

      - name: Wait for Render deploys to start
        run: sleep 120

      - name: Retry staging smoke checks
        env:
          SMOKE_TIMEOUT_MS: "10000"
        run: |
          for attempt in $(seq 1 15); do
            echo "Running staging smoke check attempt ${attempt} of 15."

            if npm run smoke:deploy; then
              exit 0
            fi

            if [ "${attempt}" -eq 15 ]; then
              echo "Staging smoke checks did not pass after 15 attempts." >&2
              exit 1
            fi

            sleep 20
          done
